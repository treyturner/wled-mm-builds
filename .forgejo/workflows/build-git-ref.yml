name: build-git-ref

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - LICENSE

  workflow_dispatch:
    inputs:
      git-ref:
        description: WLED-MM Git ref (tag/branch/SHA) to build. Defaults to latest release
        required: false

env:
  ENV_LIST: |
    adafruit_matrix_portal_s3
    esp32-a1s_audio_sender
    lilygo_t7_s3_moonhub75
    quinled_dig2go
    quinled_diguno
    quinled_diguno_eth
    quinled_diguno_eth_temp
    quinled_diguno_temp

jobs:
  compute:
    runs-on: ubuntu-latest
    outputs:
      envs: ${{ steps.compute.outputs.envs }}
    steps:
      - id: compute
        shell: bash -euo pipefail {0}
        run: |
          # Create JSON array from multi-line ENV_LIST
          mapfile -t envs < <(printf '%s\n' "$ENV_LIST" | sed '/^[[:space:]]*$/d')
          json="$(printf '%s\n' "${envs[@]}" | jq -R -s -c 'split("\n")[:-1]')"
          echo "envs=$json" | tee -a "$GITHUB_OUTPUT"

  checkout:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.upstream.outputs.version }}
      git-ref: ${{ inputs['git-ref'] != '' && inputs['git-ref'] || steps.upstream.outputs.git_ref }}
      repo-artifact-id: ${{ steps.upload.outputs['artifact-id'] }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest upstream release version
        if: ${{ github.event_name == 'push' || inputs['git-ref'] == '' }}
        id: upstream
        shell: bash -euo pipefail {0}
        env:
          GH_PAT_TREYTURNER: ${{ secrets.GH_PAT_TREYTURNER }}
        run: |
          version=$(curl -fsSL \
            -H "Authorization: Bearer $GH_PAT_TREYTURNER" \
            "https://api.github.com/repos/MoonModules/WLED-MM/releases/latest" \
            | jq -r '.tag_name | ltrimstr("v")')

          if [[ -z "$version" || "$version" == "null" ]]; then
            echo "ERROR: Unable to determine latest upstream release tag."
            exit 1
          fi

          { echo "version=$version"
            echo "git_ref=v$version"
          } | tee -a "$GITHUB_OUTPUT"

      - name: Checkout upstream Git ref
        env:
          GIT_REF: ${{ inputs['git-ref'] != '' && inputs['git-ref'] || steps.upstream.outputs.git_ref }}
        run: |
          make checkout GIT_REF="$GIT_REF"

      - name: Collect dependencies and prepare toolchains
        run: |
          make build-prep ENV_LIST="$ENV_LIST"

      - name: Package workspace
        run: |
          tar -czf /tmp/repo.tgz .
          echo "moving /tmp/repo.tgz ($(du -h --apparent-size -- "/tmp/repo.tgz" | cut -f1)) to $(pwd)..."
          mv /tmp/repo.tgz repo.tgz

      - name: Upload workspace
        id: upload
        uses: actions/upload-artifact@v3
        with:
          name: repo
          path: repo.tgz

  build:
    needs: [compute, checkout]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ fromJSON(needs.compute.outputs.envs) }}
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v3
        with:
          name: repo

      - name: Extract workspace
        run: |
          tar -xzf repo.tgz
          rm repo.tgz

      - name: Build
        env:
          GIT_REF: ${{ inputs['git-ref'] != '' && inputs['git-ref'] || needs.checkout.outputs['git-ref'] }}
          ENVIRONMENT: ${{ matrix.environment }}
        run: |
          make build GIT_REF="$GIT_REF" PIO_ENVS="$ENVIRONMENT"

      - name: Upload binaries
        uses: actions/upload-artifact@v3
        with:
          name: build-${{ matrix.environment }}
          path: build/*

  publish:
    needs: [checkout, build]
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.release.outputs.release_id }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v3
        with:
          pattern: build-*
          path: build
          merge-multiple: true

      - name: Collect and assert binaries
        id: find
        run: |
          mapfile -d '' -t files < <(find build -type f -name '*.bin' -print0)

          env_count=$(printf '%s\n' "$ENV_LIST" | sed '/^[[:space:]]*$/d' | wc -l)
          expected=$(( env_count * 2 ))
          actual=${#files[@]}

          if (( actual != expected )); then
            echo "ERROR: Expected $expected .bin files (2 per env for $env_count envs), got $actual"
            printf '%s\n' "${files[@]}"
            exit 1
          fi

          { echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } | tee -a "$GITHUB_OUTPUT"

      - name: Create release
        id: release
        shell: bash -euo pipefail {0}
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          GIT_REF: ${{ inputs['git-ref'] || needs.checkout.outputs['git-ref'] }}
        run: |
          tag="${GIT_REF}-${RUN_ID}-${RUN_ATTEMPT}"
          if [[ "$GIT_REF" == "mdev" ]]; then
            # Stamp trunk builds with datetime and SHA
            dt="$(date -u +%Y%m%d%H%m%S)"
            wled_dir="${WLEDMM_DIR:-WLED-MM}"
            short_sha=""
            if [[ -d "$wled_dir/.git" ]]; then
              short_sha="$(git -C "$wled_dir" rev-parse --short=7 HEAD 2>/dev/null || true)"
            fi
            if [[ -z "$short_sha" ]]; then
              echo "ERROR: Unable to determine short SHA for mdev release tag from WLED-MM."
              exit 1
            fi
            tag="mdev-${dt}-${short_sha}-${RUN_ATTEMPT}"
          fi

          payload=$(jq -n \
            --arg tag "$tag" \
            --arg sha "${GITHUB_SHA:-}" \
            '{
              tag_name: $tag,
              name: $tag,
              target_commitish: $sha,
              draft: false,
              prerelease: false
            }')

          stamp=$(date +%Y%m%d%H%M%S)
          response="$(curl -sS \
            -D /tmp/headers-$stamp.txt \
            -o /tmp/body-$stamp.txt \
            -X POST \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            -H "Content-Type: application/json" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/releases" \
            -d "$payload")"

          ct="$(awk 'tolower($1)=="content-type:" {print tolower($2)}' /tmp/headers-$stamp.txt | tr -d '\r' | head -n1)"
          if [[ "$ct" != application/json* ]]; then
            echo "ERROR: Non-JSON response:"; echo
            echo "Headers:"; cat /tmp/headers-$stamp.txt; echo
            echo "Body:"; cat /tmp/body-$stamp.txt
            exit 1
          fi

          release_id="$(jq -r '.id // empty' /tmp/body-$stamp.txt)"
          [[ -n "$release_id" ]] || { echo "ERROR: release creation failed:"; cat /tmp/body-$stamp.txt; exit 1; }
          echo "release_id=$release_id" | tee -a "$GITHUB_OUTPUT"

      - name: Attach build artifacts
        id: attach
        shell: bash -euo pipefail {0}
        env:
          FILES: ${{ steps.find.outputs.files }}
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
        run: |
          mapfile -t files <<< "$FILES"
          for f in "${files[@]}"; do
            [[ -f "$f" ]] || continue
            name="$(basename "$f")"
            encoded=$(jq -rn --arg s "$name" '$s|@uri')
            echo "Uploading asset: $name"
            curl -sS --fail \
              -X POST \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID/assets?name=$encoded" \
              --data-binary @"$f" \
              >/dev/null
          done

  cleanup:
    needs: [checkout, build, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Delete repo artifact
        shell: bash -euo pipefail {0}
        env:
          RELEASE_ID: ${{ needs.publish.outputs['release-id'] }}
          REPO_ARTIFACT_ID: ${{ needs.checkout.outputs['repo-artifact-id'] }}
        run: |
          response="$(curl -sS \
            -X DELETE \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/runs/${{ github.run_id }}/artifacts/repo" \
          )"
