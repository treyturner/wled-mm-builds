name: build-git-ref

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - LICENSE

  workflow_dispatch:
    inputs:
      git-ref:
        description: WLED-MM Git ref (tag/branch/SHA) to build. Defaults to latest release
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest upstream release version
        if: ${{ forgejo.event_name == 'push' || inputs.git-ref == '' }}
        id: upstream
        shell: bash -euo pipefail {0}
        run: |
          version=$(curl -fsSL "https://api.github.com/repos/MoonModules/WLED-MM/releases?per_page=50" \
            | jq -r '
              map(select(.draft == false and .prerelease == false))
              | max_by(.published_at)
              | .tag_name
              | ltrimstr("v")')

          if [[ -z "$version" || "$version" == "null" ]]; then
            echo "ERROR: Unable to determine latest upstream release tag."
            exit 1
          fi

          { echo "version=$version"
            echo "git_ref=v$version"
          } | tee -a "$FORGEJO_OUTPUT"

      - name: Build
        env:
          GIT_REF: ${{ inputs.git-ref || steps.upstream.outputs.git_ref }}
        run: |
          make build GIT_REF="$GIT_REF"

      - name: Release build artifacts
        env:
          RUN_ID: ${{ forgejo.run_id }}
          RUN_ATTEMPT: ${{ forgejo.run_attempt }}
          GIT_REF: ${{ inputs.git-ref || steps.upstream.outputs.git_ref }}
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          FORGEJO_API_URL: ${{ forgejo.api_url }}
          FORGEJO_SERVER_URL: ${{ forgejo.server_url }}
          FORGEJO_REPOSITORY: ${{ forgejo.repository }}
          FORGEJO_SHA: ${{ forgejo.sha }}
        run: |
          set -euo pipefail

          token="${FORGEJO_TOKEN:-}"
          if [[ -z "$token" ]]; then
            echo "ERROR: Missing FORGEJO_TOKEN"
            exit 1
          fi

          repo="${FORGEJO_REPOSITORY:-}"
          if [[ -z "$repo" ]]; then
            echo "ERROR: forgejo.repository not available."
            exit 1
          fi

          api_url="${FORGEJO_API_URL:-}"
          if [[ -z "$api_url" && -n "${FORGEJO_SERVER_URL:-}" ]]; then
            api_url="${FORGEJO_SERVER_URL%/}/api/v1"
          fi
          if [[ -z "$api_url" ]]; then
            echo "ERROR: forgejo.api_url/server_url not available."
            exit 1
          fi

          ref=""
          tag="${GIT_REF}-${RUN_ID}-${RUN_ATTEMPT}"
          if [[ "$GIT_REF" == "mdev" ]]; then
            # Stamp trunk builds with datetime and SHA
            dt="$(date -u +%Y%m%d%H%m%S)"
            wled_dir="${WLEDMM_DIR:-WLED-MM}"
            short_sha=""
            if [[ -d "$wled_dir/.git" ]]; then
              short_sha="$(git -C "$wled_dir" rev-parse --short=7 HEAD 2>/dev/null || true)"
            fi
            if [[ -z "$short_sha" ]]; then
              echo "ERROR: Unable to determine short SHA for mdev release tag from WLED-MM."
              exit 1
            fi
            tag="mdev-${dt}-${short_sha}-${RUN_ATTEMPT}"
          fi

          export RELEASE_TAG="$tag"
          target="${FORGEJO_SHA:-}"
          payload="$(python3 - <<'PY'
          import json, os
          tag = os.environ["RELEASE_TAG"]
          target = os.environ.get("FORGEJO_SHA", "")
          print(json.dumps({
            "tag_name": tag,
            "name": tag,
            "target_commitish": target,
            "draft": False,
            "prerelease": False
          }))
          PY
          )"

          release_json="$(curl -sS -X POST \
            -H "Authorization: token $token" \
            -H "Content-Type: application/json" \
            "$api_url/repos/$repo/releases" \
            -d "$payload")"

          release_id="$(python3 - <<'PY'
          import json, sys
          data = json.load(sys.stdin)
          print(data.get("id", ""))
          PY
          <<<"$release_json")"

          if [[ -z "$release_id" ]]; then
            echo "ERROR: release creation failed: $release_json"
            exit 1
          fi

          shopt -s nullglob
          files=(build/*)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "ERROR: No build artifacts found in build/."
            exit 1
          fi

          for f in "${files[@]}"; do
            if [[ ! -f "$f" ]]; then
              continue
            fi
            name="$(basename "$f")"
            encoded="$(ASSET_NAME="$name" python3 - <<'PY'
            import os, urllib.parse
            print(urllib.parse.quote(os.environ["ASSET_NAME"]))
            PY
            )"
            curl -sS --fail -X POST \
              -H "Authorization: token $token" \
              -H "Content-Type: application/octet-stream" \
              "$api_url/repos/$repo/releases/$release_id/assets?name=$encoded" \
              --data-binary @"$f" >/dev/null
          done
