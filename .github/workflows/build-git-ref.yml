name: build-git-ref

on:
  push:
    branches:
      - main
    paths-ignore:
      - README.md
      - LICENSE

  workflow_dispatch:
    inputs:
      git-ref:
        description: WLED-MM Git ref (tag/branch/SHA) to build. Defaults to latest release
        required: false

env:
  ENV_LIST: |
    adafruit_matrix_portal_s3
    esp32-a1s_audio_sender
    lilygo_t7_s3_moonhub75
    quinled_dig2go
    quinled_diguno
    quinled_diguno_eth
    quinled_diguno_eth_temp
    quinled_diguno_temp

jobs:
  compute:
    runs-on: ubuntu-latest
    outputs:
      envs: ${{ steps.compute.outputs.envs }}
    steps:
      - id: compute
        shell: bash -euo pipefail {0}
        run: |
          # Create JSON array from multi-line ENV_LIST
          mapfile -t envs < <(printf '%s\n' "$ENV_LIST" | sed '/^[[:space:]]*$/d')
          json="$(printf '%s\n' "${envs[@]}" | jq -R -s -c 'split("\n")[:-1]')"
          echo "envs=$json" | tee -a "$GITHUB_OUTPUT"

  checkout:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.upstream.outputs.version }}
      git-ref: ${{ inputs['git-ref'] != '' && inputs['git-ref'] || steps.upstream.outputs.git_ref }}
      repo-artifact-id: ${{ steps.upload.outputs['artifact-id'] }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Fetch latest upstream release version
        if: ${{ github.event_name == 'push' || inputs['git-ref'] == '' }}
        id: upstream
        shell: bash -euo pipefail {0}
        env:
          UPSTREAM_REPO: MoonModules/WLED-MM
          GH_PAT_WLED_MM_FETCH: ${{ secrets.GH_PAT_WLED_MM_FETCH }}
        run: |
          version=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_PAT_WLED_MM_FETCH}" \
            "${GITHUB_API_URL}/repos/${UPSTREAM_REPO}/releases/latest" \
            | jq -r '.tag_name | ltrimstr("v")')

          if [[ -z "$version" || "$version" == "null" ]]; then
            echo "ERROR: Unable to determine latest upstream release tag."
            exit 1
          fi

          { echo "version=$version"
            echo "git_ref=v$version"
          } | tee -a "$GITHUB_OUTPUT"

      - name: Checkout upstream Git ref
        env:
          GIT_REF: ${{ inputs['git-ref'] != '' && inputs['git-ref'] || steps.upstream.outputs.git_ref }}
          GH_PAT: ${{ secrets.GH_PAT_WLED_MM_FETCH }}
        run: |
          make checkout GIT_REF="$GIT_REF" GH_PAT="$GH_PAT"

      - name: Collect dependencies and prepare toolchains
        env:
          PUID: 1001
          PGID: 121
        run: make build-prep ENV_LIST="$ENV_LIST"

      - name: Package workspace
        run: |
          tar -czf /tmp/repo.tgz .
          echo "moving /tmp/repo.tgz ($(du -h --apparent-size -- "/tmp/repo.tgz" | cut -f1)) to $(pwd)..."
          mv /tmp/repo.tgz repo.tgz

      - name: Upload workspace
        id: upload
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: repo
          path: repo.tgz

  build:
    needs: [compute, checkout]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ${{ fromJSON(needs.compute.outputs.envs) }}
    steps:
      - name: Download workspace
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: repo

      - name: Extract workspace
        run: |
          tar -xzf repo.tgz
          rm repo.tgz

      - name: Build
        env:
          GIT_REF: ${{ inputs['git-ref'] != '' && inputs['git-ref'] || needs.checkout.outputs['git-ref'] }}
          ENVIRONMENT: ${{ matrix.environment }}
          PUID: 1001
          PGID: 121
        run: |
          make build GIT_REF="$GIT_REF" PIO_ENVS="$ENVIRONMENT"

      - name: Upload binaries
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: build-${{ matrix.environment }}
          path: build/*

  publish:
    needs: [checkout, build]
    runs-on: ubuntu-latest
    outputs:
      github-release-id: ${{ steps.release.outputs.github_release_id }}
      forgejo-release-id: ${{ steps.release.outputs.forgejo_release_id }}
    env:
      FORGEJO_API_URL: ${{ secrets.FORGEJO_API_URL }}
      FORGEJO_TOKEN: ${{ secrets.FORGEJO_REPOSITORY_TOKEN }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: build-*
          path: build
          merge-multiple: true

      - name: Collect and assert binaries
        id: find
        run: |
          mapfile -d '' -t files < <(find build -type f -name '*.bin' -print0)

          env_count=$(printf '%s\n' "$ENV_LIST" | sed '/^[[:space:]]*$/d' | wc -l)
          expected=$(( env_count * 2 ))
          actual=${#files[@]}

          if (( actual != expected )); then
            echo "ERROR: Expected $expected .bin files (2 per env for $env_count envs), got $actual"
            printf '%s\n' "${files[@]}"
            exit 1
          fi

          { echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } | tee -a "$GITHUB_OUTPUT"

      - name: Create release on GitHub and Forgejo
        id: release
        shell: bash -euo pipefail {0}
        env:
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          GIT_REF: ${{ inputs['git-ref'] || needs.checkout.outputs['git-ref'] }}
        run: |
          tag="${GIT_REF}-${RUN_ID}-${RUN_ATTEMPT}"
          if [[ "$GIT_REF" == "mdev" ]]; then
            # Stamp trunk builds with datetime and SHA
            dt="$(date -u +%Y%m%d%H%M%S)"
            wled_dir="${WLEDMM_DIR:-WLED-MM}"
            short_sha=""
            if [[ -d "$wled_dir/.git" ]]; then
              short_sha="$(git -C "$wled_dir" rev-parse --short=7 HEAD 2>/dev/null || true)"
            fi
            if [[ -z "$short_sha" ]]; then
              echo "ERROR: Unable to determine short SHA for mdev release tag from WLED-MM."
              exit 1
            fi
            tag="mdev-${dt}-${short_sha}-${RUN_ATTEMPT}"
          fi

          payload=$(jq -n \
            --arg tag "$tag" \
            --arg sha "${GITHUB_SHA:-}" \
            '{
              tag_name: $tag,
              name: $tag,
              target_commitish: $sha,
              draft: false,
              prerelease: false
            }')

          declare -A providers=(
            ["github"]="$GITHUB_API_URL $GITHUB_TOKEN"
            ["forgejo"]="$FORGEJO_API_URL $FORGEJO_TOKEN"
          )

          for provider in "${!providers[@]}"; do
            api_url=""; token=""
            IFS=' ' read -r api_url token <<< "${providers[$provider]}"
            stamp=$(date +%Y%m%d%H%M%S)

            curl -sS \
              -D /tmp/headers-$stamp.txt \
              -o /tmp/body-$stamp.txt \
              -X POST \
              -H "Authorization: token ${token}" \
              -H "Content-Type: application/json" \
              "$api_url/repos/$GITHUB_REPOSITORY/releases" \
              -d "$payload"

            ct="$(awk 'tolower($1)=="content-type:" {print tolower($2)}' /tmp/headers-$stamp.txt | tr -d '\r' | head -n1)"
            if [[ "$ct" != application/json* ]]; then
              echo "ERROR: Non-JSON response:"; echo
              echo "Headers:"; cat /tmp/headers-$stamp.txt; echo
              echo "Body:"; cat /tmp/body-$stamp.txt
              exit 1
            fi

            release_id="$(jq -r '.id // empty' /tmp/body-$stamp.txt)"
            [[ -n "$release_id" ]] || { echo "ERROR: $provider release creation failed:"; cat /tmp/body-$stamp.txt; exit 1; }
            echo "${provider}_release_id=$release_id" | tee -a "$GITHUB_OUTPUT"
          done

      - name: Attach build artifacts
        id: attach
        shell: bash -euo pipefail {0}
        env:
          FILES: ${{ steps.find.outputs.files }}
          GITHUB_RELEASE_ID: ${{ steps.release.outputs.github_release_id }}
          FORGEJO_RELEASE_ID: ${{ steps.release.outputs.forgejo_release_id }}
        run: |
          mapfile -t files <<< "$FILES"
          declare -A providers=(
            ["github"]="${GITHUB_API_URL} ${GITHUB_TOKEN} ${GITHUB_RELEASE_ID}"
            ["forgejo"]="${FORGEJO_API_URL} ${FORGEJO_TOKEN} ${FORGEJO_RELEASE_ID}"
          )

          for provider in "${!providers[@]}"; do
            api_url=""; token=""; release_id=""
            IFS=' ' read -r api_url token release_id <<< "${providers[$provider]}"

            echo "Attaching binaries to $provider release..."
            for f in "${files[@]}"; do
              [[ -f "$f" ]] || continue
              name="$(basename "$f")"
              encoded=$(jq -rn --arg s "$name" '$s|@uri')
              echo "Uploading asset: $name"
              curl -sS --fail \
                -X POST \
                -H "Authorization: token ${token}" \
                -H "Content-Type: application/octet-stream" \
                "${api_url}/repos/${GITHUB_REPOSITORY}/releases/${release_id}/assets?name=${encoded}" \
                --data-binary @"$f" \
                >/dev/null
            done
          done

  cleanup:
    needs: [checkout, build, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Delete repo artifact
        shell: bash -euo pipefail {0}
        env:
          RELEASE_ID: ${{ needs.publish.outputs['github-release-id'] }}
          REPO_ARTIFACT_ID: ${{ needs.checkout.outputs['repo-artifact-id'] }}
        run: |
          curl -sS \
            -X DELETE \
            -H "Authorization: token ${GITHUB_TOKEN}" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/actions/artifacts/${REPO_ARTIFACT_ID}"
