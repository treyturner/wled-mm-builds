  -D SERVERNAME='"QuinLED-DigUno"'

build_unflags =
  ${quinboards.build_unflags_diguno_common}
  ${treyturner.build_unflags_temp}      ;; no temperature sensor

lib_deps = ${esp32_4MB_V4_M_base.esp32_lib_deps}

lib_ignore =
  ${common_mm.HUB75_lib_ignore}         ;; not feasible on diguno
  ${treyturner.lib_ignore_temp}         ;; no temperature sensor


