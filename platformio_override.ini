###############
### GLOBALS ###
###############

[treyturner]
build_flags =
  -D SR_ENABLE_DEFAULT
  -D AUTOSAVE_AFTER_SEC=0         ;; disable autosave by default
  -D WLEDMM_WIFI_POWERON_HACK     ;; allow wifi sleep
  -D WLED_AP_SSID_UNIQUE
  -D WLED_WATCHDOG_TIMEOUT=0 -D CONFIG_ASYNC_TCP_USE_WDT=0
  -D WLED_DISABLE_BROWNOUT_DET
  -D CONFIG_ASYNC_TCP_STACK_SIZE=9472  ;; WLEDMM increase stack by 1.25Kb, as audioreactive needs bigger SETTINGS_STACK_BUF_SIZE
  -D ENCODER_CLK_PIN=-1 -D ENCODER_DT_PIN=-1 -D ENCODER_SW_PIN=-1    ;; no default rotary pins
  -D IRTYPE=0                     ;; user needs to set remote type
  !python -c "import os; print(\"-D CLIENT_SSID='\\\"{}\\\"'\".format(os.getenv('IOT_SSID', 'Your_Network')))"
  !python -c "import os; print(\"-D CLIENT_PASS='\\\"{}\\\"'\".format(os.getenv('WPA_KEY', '')))"
  -D WLED_ENABLE_PIXELFORGE
  -D USERMOD_FASTLED              ;; enable not-for-profit effects

build_flags_serial_to_usb =             ;; for Serial-to-USB chip
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=0
  -D ARDUINO_USB_MSC_ON_BOOT=0
  -D ARDUINO_USB_DFU_ON_BOOT=0

build_flags_hardware_cdc =              ;; for Hardware-CDC USB mode
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ARDUINO_USB_MSC_ON_BOOT=0
  -D ARDUINO_USB_DFU_ON_BOOT=1

build_flags_psram =
  -D BOARD_HAS_PSRAM
  -D WLED_USE_PSRAM
  -D WLED_USE_PSRAM_JSON
  -D ALL_JSON_TO_PSRAM                  ;; force all JSON stuff into PSRAM; gives more free heap
  ;-DCONFIG_MBEDTLS_DYNAMIC_BUFFER=1    ;; optional - seems to move more buffers into PSRAM

build_flags_hub75 =
  ${common_mm.HUB75_build_flags}
  ;-D JSON_BUFFER_SIZE=18432            ;; default 54000
  -D MIN_HEAP_SIZE=6144                 ;; default 8192
  -D MAX_SEGMENT_DATA=40960             ;; default 32767
  -D DEFAULT_LED_TYPE=101
  -D LEDPIN=14 -D RLYPIN=-1 -D AUDIOPIN=-1      ;; defaults that avoid pin conflicts with HUB75
  -D WLED_DISABLE_ADALIGHT -D WLED_DISABLE_ALEXA -D WLED_DISABLE_ESPNOW  ;; common_mm.build_disable_sync_interfaces but with infrared omitted
  -D WLED_DISABLE_HUESYNC -D WLED_DISABLE_LOXONE -D WLED_DISABLE_MQTT

build_flags_skip_ir = -D WLED_DISABLE_INFRARED -D _IR_ENABLE_DEFAULT_=false -D IRPIN=-1

## build unflags
build_unflags_dmx = ${common_mm.DMXin_build_flags}
build_unflags_temp = -D USERMOD_DALLASTEMPERATURE -D TEMPERATURE_PIN
build_unflags_skip_ir = -D _IR_ENABLE_DEFAULT_=true

## lib ignores
lib_ignore_temp = paulstoffregen/OneWire
lib_ignore_ir = IRremoteESP8266
lib_ignore_dmx = esp_dmx


[quinboards]
build_flags_diguno_common =
  -D WLED_BRAND='"QuinLED"'
  -D ABL_MILLIAMPS_DEFAULT=1250               ;; max amps from usb
  -D DATA_PINS=16,3 -D PIXEL_COUNTS=30,30     ;; two data pins
  -D BTNPIN=0                                 ;; onboard button
  -D RLYPIN=-1                                ;; no relay
  -D AUDIOPIN=36                              ;; analog audio
  -D I2S_CKPIN=-1 -D I2S_WSPIN=-1 -D I2S_SDPIN=-1 -D MCLK_PIN=-1 ;; no i2s
  -D HW_PIN_SDA=-1 -D HW_PIN_SCL=-1           ;; no i2c
  -D SR_DMTYPE=254                            ;; network audio
  -D SR_FREQ_PROF=1 -D SR_GAIN=37 -D SR_SQUELCH=10
  ${treyturner.build_flags_skip_ir}           ;; no infrared

build_flags_temp = -D TEMPERATURE_PIN=13 -D USERMOD_DALLASTEMPERATURE_MEASUREMENT_INTERVAL=10000
build_flags_ethernet = -D WLED_USE_ETHERNET -D WLED_ETH_DEFAULT=4
build_flags_octa = -D WLED_USE_ETHERNET -D WLED_ETH_DEFAULT=8

build_unflags_diguno_common =
  ${esp32_4MB_V4_M_base.build_unflags}
  -D LEDPIN
  ${common_mm.HUB75_build_flags}        ;; not feasible on diguno
  ${treyturner.build_unflags_skip_ir}   ;; no infrared
  ;-D ARDUINO_USB_CDC_ON_BOOT=1         ;; uncomment if output is spammy


#####################
### BOARD CONFIGS ###
#####################

[env:quinled_dig2go]
extends = esp32_4MB_V4_M_base
platform = ${esp32.platform}            ;; "V4" tasmota
board_build.partitions = ${esp32.default_partitions}
platform_packages = ${esp32.platform_packages}

build_flags =
  ${esp32_4MB_V4_M_base.esp32_build_flags}
  ${treyturner.build_flags}
  ${treyturner.build_flags_serial_to_usb}
  -D WLED_BRAND='"QuinLED"'
  -D WLED_RELEASE_NAME='QuinLED Dig2go MM'
  -D SERVERNAME='"QuinLED-Dig2go"'
  -D ABL_MILLIAMPS_DEFAULT=3000         ;; dig2go max amps
  -D LEDPIN=16 -D PIXEL_COUNTS=30       ;; one data pin
  -D BTNPIN=0                           ;; onboard button
  -D IRPIN=5                            ;; infrared receiver
  -D RLYPIN=12                          ;; onboard relay
  -D SR_DMTYPE=1                        ;; onboard I2S mic
  -D SR_FREQ_PROF=0 -D SR_GAIN=30 -D SR_SQUELCH=10
  -D I2S_CKPIN=18 -D I2S_WSPIN=4 -D I2S_SDPIN=19 -D MCLK_PIN=-1
  -D HW_PIN_SDA=21 -D HW_PIN_SCL=22     ;; optional I2C header pins

build_unflags =
  ${esp32_4MB_V4_M_base.build_unflags}
  ${common_mm.HUB75_build_flags}        ;; not feasible on dig2go
  ${treyturner.build_unflags_temp}      ;; no onboard temp sensor
  ;-D ARDUINO_USB_CDC_ON_BOOT=1         ;; uncomment if output is spammy
  -D WLED_DISABLE_INFRARED              ;; uncomment if ir isn't included for some reason

lib_deps = ${esp32_4MB_V4_M_base.esp32_lib_deps}

lib_ignore =
  ${common_mm.HUB75_lib_ignore}         ;; not feasible on dig2go
  ${treyturner.lib_ignore_temp}         ;; no onboard temperature sensor


[env:quinled_diguno]
extends = esp32_4MB_V4_M_base
