[env:lilygo_t7_s3_moonhub75]
extends = env:esp32S3_8MB_PSRAM_M
platform = ${esp32.platformV4}          ;; uses standard espressif platform instead of tasmota
platform_packages = ${esp32.platformV4_packages}
board = lilygo-t7-s3
board_build.arduino.memory_type = qio_opi
board_build.flash_mode = qio

build_flags =
  ${common.build_flags} ${esp32s3.build_flags} -Wno-misleading-indentation -Wno-format-truncation
  ${common_mm.build_flags_S} ${common_mm.build_flags_M}
  ${Speed_Flags.build_flags_V4}         ;; optimize for speed
  ${treyturner.build_flags}
  ${treyturner.build_flags_serial_to_usb}
  -D WLED_BRAND='"Lilygo"'
  -D WLED_RELEASE_NAME='Lilygo T7 S3 MOONHUB75 MM'
  -D SERVERNAME='"Lilygo-T7-S3-MOONHUB75"'
  ${treyturner.build_flags_hub75}       ;; enable HUB75
  ${treyturner.build_flags_psram}       ;; enable PSRAM
  -D MOONHUB_S3_PINOUT                  ;; MOONHUB75 pinout
  -D I2S_SDPIN=10 -D I2S_CKPIN=11 -D I2S_WSPIN=12 -D MCLK_PIN=-1  ;; hub75 driver
  -D USERMOD_BATTERY -D USERMOD_BATTERY_MEASUREMENT_PIN=2  ;; battery support
  -D STATUSLED=17                       ;; onboard LED
  -D BTNPIN=0                           ;; onboard button
  ${treyturner.build_flags_skip_ir}     ;; no infrared
  -D SR_DMTYPE=254                      ;; network receive audio
  -D SR_FREQ_PROF=1 -D SR_GAIN=37 -D SR_SQUELCH=10
  -D ABL_MILLIAMPS_DEFAULT=1250
  ;; FEATURES
  ${common_mm.animartrix_build_flags}
  -D WLED_ENABLE_GIF                    ;; 28KB Flash
  -D WLED_ENABLE_PIXART                 ;; 8KB Flash
  -D WLED_ENABLE_PIXELFORGE             ;; 12KB Flash

build_unflags =
  ${env:esp32S3_8MB_PSRAM_M.build_unflags}
  -D WLED_RELEASE_NAME=esp32S3_8MB_M
  -D LEDPIN=21
  ${Speed_Flags.build_unflags}          ;; to override -Os
  ${treyturner.build_unflags_dmx}       ;; skip dmx support
  ${treyturner.build_unflags_skip_ir}   ;; no infrared
  ${treyturner.build_unflags_temp}      ;; no temperature sensor
  ;-D WLED_ENABLE_LOXONE                ;; cruft? uncomment if loxone is enabled for some reason

lib_deps =
  ${esp32s3.lib_deps}
  ${common_mm.lib_deps_S}
  ${common_mm.lib_deps_V4_M}
  ${common_mm.HUB75_lib_deps}
  ${common_mm.animartrix_lib_deps}

lib_ignore =
  ${treyturner.lib_ignore_dmx}
  ${treyturner.lib_ignore_temp}
  ${treyturner.lib_ignore_ir}

board_build.partitions = ${esp32.extreme_partitions}
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216


[env:adafruit_matrix_portal_s3]
extends = esp32_4MB_V4_M_base
platform = ${esp32.platformV4_xp}
platform_packages = ${esp32.platformV4_packages_xp}
board = adafruit_matrixportal_esp32s3_wled
board_build.partitions = tools/partitions-8MB_spiffs-tinyuf2.csv    ;; use original adafruit 8MB tinyUF2 partitioning

build_flags = ${common.build_flags} ${esp32s3.build_flags} -Wno-misleading-indentation -Wno-format-truncation
  ${common_mm.build_flags_S}
  ${common_mm.build_flags_M}
  ${Speed_Flags.build_flags_V4}  ;; -O2 -> optimize for speed instead of size
  ${treyturner.build_flags}
  ${treyturner.build_flags_serial_to_usb}
  -D WLED_BRAND='"Adafruit"'
  -D WLED_RELEASE_NAME='Adafruit Matrix Portal S3 MM'
  -D SERVERNAME='"Adafruit-Matrix-Portal-S3"'
  ${treyturner.build_flags_hub75}
  ${treyturner.build_flags_psram}
  -D BTNPIN=7                           ;; down button
  -D STATUSLED=17                       ;; onboard LED
  ${treyturner.build_flags_skip_ir}     ;; no infrared
  -D SR_DMTYPE=254                      ;; network receive audio
  -D SR_FREQ_PROF=1 -D SR_GAIN=37 -D SR_SQUELCH=10
  -D ABL_MILLIAMPS_DEFAULT=1250

  ;; FEATURES
  ${common_mm.animartrix_build_flags}
  -D WLED_ENABLE_GIF                    ;; 28KB Flash
  -D WLED_ENABLE_PIXART                 ;; 8KB Flash
  -D WLED_ENABLE_PIXELFORGE             ;; 12KB Flash

build_unflags =
  ${env:esp32S3_8MB_M.build_unflags}    ;; use the same as "normal" S3 buildenv
  ${Speed_Flags.build_unflags}          ;; to override -Os
  ${treyturner.build_unflags_dmx}       ;; skip dmx support
  ${treyturner.build_unflags_temp}      ;; no temperature sensor
  ${treyturner.build_unflags_skip_ir}   ;; no infrared
  ;-D WLED_ENABLE_LOXONE                ;; cruft? uncomment if loxone is enabled for some reason
  -D ARDUINO_USB_CDC_ON_BOOT=1          ;; fix warning: "ARDUINO_USB_CDC_ON_BOOT" redefined; comment out for Serial debug

lib_deps = ${esp32s3.lib_deps} ${common_mm.lib_deps_S}  ;; do not include ${esp32.lib_depsV4} !!!!
  ${common_mm.animartrix_lib_deps}
  ${common_mm.HUB75_lib_deps}

lib_ignore =
  ${treyturner.lib_ignore_dmx}
  ${treyturner.lib_ignore_ir}
  ${treyturner.lib_ignore_temp}

monitor_filters = esp32_exception_decoder


# ESP32-A1S Audio Kit as a dedicated WLED audio analyzer/sender
[env:esp32-a1s_audio_sender]
extends = esp32_4MB_V4_S_base

build_flags =
  ${esp32_4MB_V4_S_base.esp32_build_flags}
  ${treyturner.build_flags}
  ${treyturner.build_flags_serial_to_usb}
  ${common_mm.build_disable_sync_interfaces}  ;; strip it down
  ${treyturner.build_flags_skip_ir}
  -D WLED_BRAND='"Ai-Thinker"'
  -D WLED_RELEASE_NAME='Ai-Thinker ESP32-A1S Audio Sender MM'
  -D SERVERNAME='"ESP32-A1S-Audio-Sender"'
  -D PIXEL_COUNTS=1 -D ABL_MILLIAMPS_DEFAULT=1
  -D BTNPIN=36 -D AUDIOPIN=-1 -D RLYPIN=-1
  -D I2S_SDPIN=35 -D I2S_WSPIN=25 -D I2S_CKPIN=27 -D MCLK_PIN=0  ;; I2S line in pins
  -D HW_PIN_SDA=33 -D HW_PIN_SCL=32  ;; I2C
  -D SR_DMTYPE=4 -D SR_FREQ_PROF=1 -D SR_GAIN=37 -D SR_SQUELCH=10  ;; line in settings
  ;; FEATURES
  -D WLED_DISABLE_PARTICLESYSTEM1D
  -D WLED_DISABLE_PARTICLESYSTEM2D
  -D WLED_MAX_BUTTONS=1

build_unflags =
  ${esp32_4MB_V4_S_base.build_unflags}
  ${treyturner.build_unflags_dmx}
  ${treyturner.build_unflags_temp}
  ${treyturner.build_unflags_skip_ir}
  -D USERMOD_AUTO_SAVE
  -D LEDPIN
  -D ABL_MILLIAMPS_DEFAULT
  -D WLED_MAX_BUTTONS

lib_deps = ${esp32_4MB_V4_S_base.esp32_lib_deps}

lib_ignore =
  ${treyturner.lib_ignore_dmx}
  ${treyturner.lib_ignore_ir}
  ${treyturner.lib_ignore_temp}
